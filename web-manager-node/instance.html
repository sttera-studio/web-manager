<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Instance</title>
    <link rel="stylesheet" href="/global.css" />
  </head>
  <body>
    <main class="container">
      <header class="header">
        <h1>Managed Instance</h1>
        <button id="go-panel">Open Manager</button>
      </header>

      <div class="status">
        <div class="card">
          <div class="metric">Instance ID</div>
          <div id="instance-id" class="metric-value id">-</div>
        </div>
        <div class="card">
          <div class="metric">Role</div>
          <div class="metric-value"><span class="badge role-instance">Instance</span></div>
        </div>
        <div class="card">
          <div class="metric">Room</div>
          <div id="instance-room" class="metric-value">lobby</div>
        </div>
        <div class="card">
          <div class="metric">Connection</div>
          <div id="ws-state" class="metric-value warning">Connecting...</div>
        </div>
        <div class="card">
          <div class="metric">Instance State</div>
          <div id="webgl-state" class="metric-value">idle</div>
        </div>
      </div>

      <section class="panels">
        <section class="card">
          <div class="panel-head">
            <h2 class="panel-title">Local events</h2>
            <span class="small">Events sent to the manager</span>
          </div>
          <div id="logs" class="logs"></div>
        </section>
      </section>
    </main>

    <script src="/instance.js"></script>
  </body>
</html>

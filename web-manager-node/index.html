<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Web Manager</title>
    <link rel="stylesheet" href="/global.css" />
  </head>
  <body>
    <main class="container">
      <header class="header">
        <h1>Web Manager</h1>
        <div id="ws-state" class="metric-value warning">Connecting...</div>
      </header>

      <section class="card">
        <div class="panel-head">
          <h2 class="panel-title">Current Room</h2>
        </div>
        <div class="actions" style="margin-top: 10px">
          <button id="create-room" class="primary">Create Room</button>
          <button id="copy-link">Copy Link</button>
        </div>

        <div class="summary-line">
          <span>manager: <span id="my-id" class="id">-</span></span>
          <span>role: <span class="badge role-manager">manager</span></span>
          <span>room: <span id="current-room">lobby</span></span>
          <span>clients: <span id="tabs-count">0</span></span>
        </div>
      </section>

      <section class="card">
        <div class="panel-head">
          <h2 class="panel-title">Room Dashboard</h2>
          <span class="small">instances, managers and recent activity</span>
        </div>
        <div id="rooms-grid" class="room-grid"></div>
      </section>

      <section class="panels">
        <section class="card">
          <div class="panel-head">
            <h2 class="panel-title">Room Clients</h2>
            <span class="small">single client controls</span>
          </div>
          <table>
            <thead>
              <tr>
                <th>Instance</th>
                <th>Label</th>
                <th>Role</th>
                <th>Last seen</th>
              </tr>
            </thead>
            <tbody id="tabs-table"></tbody>
          </table>
        </section>
      </section>
    </main>

    <script src="/index.js"></script>
  </body>
</html>

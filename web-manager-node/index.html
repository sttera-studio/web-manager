<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Network Manager</title>
    <link rel="stylesheet" href="/global.css" />
  </head>
  <body>
    <div class="container">
      <div class="header">
        <div class="brand">
          <h1>Network Manager</h1>
        </div>
        <div class="actions">
          <button id="refresh" class="primary">Refresh</button>
        </div>
      </div>

      <div class="status">
        <div class="card">
          <div class="metric">This instance ID</div>
          <div id="my-id" class="metric-value id">-</div>
        </div>
        <div class="card">
          <div class="metric">Connection</div>
          <div id="ws-state" class="metric-value warning">Connecting...</div>
        </div>
        <div class="card">
          <div class="metric">Online connected instances</div>
          <div id="tabs-count" class="metric-value">0</div>
        </div>
        <div class="card">
          <div class="metric">Last update</div>
          <div id="last-update" class="metric-value">-</div>
        </div>
      </div>

      <div class="panels">
        <section class="card">
          <div class="panel-head">
            <h2 class="panel-title">Connected instances</h2>
            <span class="small">Actions apply to instances connected to this app.</span>
          </div>
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Label</th>
                <th>Page</th>
                <th>Role</th>
                <th>Last seen</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="tabs-table"></tbody>
          </table>
        </section>

        <section class="card">
          <div class="panel-head">
            <h2 class="panel-title">Events</h2>
            <span class="small">Live events from connected instances</span>
          </div>
          <div id="logs" class="logs"></div>
        </section>
      </div>
    </div>

    <script src="/index.js"></script>
  </body>
</html>
